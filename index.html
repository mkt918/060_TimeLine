<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Analyzer - 移動履歴の分析・可視化</title>
  <meta name="description" content="Googleタイムラインのデータをインポートして移動履歴を分析し、地図上に可視化するツール">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-white text-gray-800 min-h-screen flex flex-col">

  <!-- ヘッダー -->
  <header id="app-header" class="bg-white/90 backdrop-blur-lg border-b border-gray-100 px-4 py-3 flex items-center justify-between z-50 relative shadow-sm">
    <div class="flex items-center gap-3">
      <div class="header-icon">
        <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
      </div>
      <div>
        <h1 class="text-base font-bold text-gray-800 leading-tight">Timeline Analyzer</h1>
        <p class="text-xs text-gray-400 leading-tight">移動履歴の分析・可視化</p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div id="file-info" class="hidden"></div>
      <input type="file" id="file-input" accept=".json" multiple class="hidden">
      <button id="import-btn" class="import-button flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        JSONインポート
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-1 flex relative overflow-hidden">

    <!-- 地図エリア -->
    <div class="flex-1 relative">
      <!-- ウェルカム/ドロップゾーン -->
      <div id="welcome" class="absolute inset-0 flex items-center justify-center z-10 bg-gray-50/80 backdrop-blur-sm">
        <div id="drop-zone" class="drop-zone w-full max-w-lg mx-4 p-10 rounded-2xl border-2 border-dashed border-gray-200 bg-white text-center transition-all">
          <div class="mb-4">
            <div class="w-16 h-16 mx-auto bg-indigo-50 rounded-2xl flex items-center justify-center mb-4">
              <svg class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
              </svg>
            </div>
            <h2 class="text-lg font-bold text-gray-700 mb-2">Google タイムラインデータをインポート</h2>
            <p class="text-sm text-gray-400 mb-1">JSONファイルをドラッグ＆ドロップ、または下のボタンからファイルを選択</p>
            <p class="text-xs text-gray-300">対応形式: Semantic Location History / Timeline.json / Records.json</p>
          </div>
          <button onclick="document.getElementById('file-input').click()" class="mt-4 px-6 py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30">
            ファイルを選択
          </button>
        </div>
      </div>

      <!-- 地図 -->
      <div id="map" class="w-full h-full"></div>

      <!-- ローディング -->
      <div id="loading" class="hidden absolute inset-0 flex items-center justify-center z-20 bg-white/80 backdrop-blur-sm">
        <div class="text-center">
          <div class="loading-spinner mx-auto mb-3"></div>
          <p class="text-sm text-gray-500">データを読み込み中...</p>
        </div>
      </div>

      <!-- 日付フィルター -->
      <div id="filter-panel" class="hidden absolute top-3 left-3 z-30 bg-white/95 backdrop-blur-md rounded-xl shadow-lg border border-gray-100 p-3">
        <div class="flex flex-col gap-3">
          <!-- 日付フィルター -->
          <div class="space-y-2">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              期間フィルター
            </h3>
            <div class="grid grid-cols-2 gap-2">
              <input type="date" id="filter-start" class="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1.5 text-xs text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
              <input type="date" id="filter-end" class="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1.5 text-xs text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <!-- 滞在フィルター -->
          <div class="space-y-2 pt-1">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              滞在時間フィルター
            </h3>
            <div class="flex items-center gap-2">
              <input type="range" id="filter-duration" min="0" max="120" value="5" class="flex-1 accent-blue-600 h-1.5 bg-gray-200 rounded-lg cursor-pointer">
              <span id="duration-value" class="text-xs font-mono text-gray-600 w-12 text-right">5分〜</span>
            </div>
            <div class="flex flex-col gap-2 mt-1">
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" id="exclude-tags" checked class="w-3.5 h-3.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-xs text-gray-600 group-hover:text-gray-900 transition-colors">🏠 タグ(HOME/WORK)で除外</span>
              </label>
              
              <!-- 除外先マスタ管理 -->
              <div class="mt-2 p-3 bg-gray-50 rounded-xl border border-gray-100 space-y-3">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">📍 除外先マスタ</p>
                
                <!-- 地点追加フォーム -->
                <div class="space-y-1".antigravity-ignore>
                  <input type="text" id="master-name" placeholder="地点名 (例: 自宅)" class="w-full text-[10px] border border-gray-200 rounded px-2 py-1 focus:ring-1 focus:ring-blue-400 outline-none">
                  <div class="flex gap-1">
                    <input type="text" id="master-coords" placeholder="緯度,経度" class="flex-1 text-[10px] border border-gray-200 rounded px-2 py-1 focus:ring-1 focus:ring-blue-400 outline-none">
                    <input type="number" id="master-radius" value="500" placeholder="半径(m)" class="w-16 text-[10px] border border-gray-200 rounded px-2 py-1 focus:ring-1 focus:ring-blue-400 outline-none">
                  </div>
                  <button id="add-master-point" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-[10px] font-bold py-1 rounded transition-colors">+ 地点を追加</button>
                </div>

                <!-- 登録済みリスト -->
                <div id="master-list" class="max-h-32 overflow-y-auto space-y-1 border-t border-gray-200 pt-2">
                  <!-- JSで動的に追加 -->
                </div>
                
                <p class="text-[9px] text-gray-400 leading-tight">現在の地点より半径内にある履歴を非表示にします。データはブラウザに保存されます。</p>
              </div>
            </div>
          </div>

          <div class="flex gap-2 mt-2">
            <button id="filter-apply" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-medium py-2 rounded-lg transition-all shadow-sm flex items-center justify-center gap-2">
              フィルターを適用
            </button>
            <button id="filter-reset" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-xs font-medium transition-all">リセット</button>
          </div>
        </div>
      </div>
    </div>

    <!-- サイドパネル -->
    <aside id="sidebar" class="hidden w-80 bg-white border-l border-gray-100 overflow-y-auto sidebar-panel">
      <div class="p-4 space-y-5">

        <!-- 概要 -->
        <section>
          <h2 class="section-title flex items-center gap-2 text-sm font-bold text-gray-600 mb-3">
            <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
            </svg>
            概要
          </h2>
          <div id="stats-overview"></div>
        </section>

        <hr class="border-gray-100">

        <!-- 移動手段別 -->
        <section>
          <h2 class="section-title flex items-center gap-2 text-sm font-bold text-gray-600 mb-3">
            <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H18.75m-7.5-11.25v-.75a.75.75 0 00-1.5 0v.75m1.5 0H9.75m1.5 0a4.5 4.5 0 012.587.809m-4.087-.809a4.5 4.5 0 00-2.587.809m4.674 4.441A4.5 4.5 0 0112 9.75a4.5 4.5 0 01-.837 2.625m1.674 0a3.375 3.375 0 00-1.674 0" />
            </svg>
            移動手段
          </h2>
          <div id="stats-activities"></div>
        </section>

        <hr class="border-gray-100">

        <!-- よく訪れた場所 -->
        <section>
          <h2 class="section-title flex items-center gap-2 text-sm font-bold text-gray-600 mb-3">
            <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
            </svg>
            よく訪れた場所
          </h2>
          <div id="stats-places"></div>
        </section>

      </div>
    </aside>

  </main>

  <!-- トースト通知 -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- App Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/map.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
